<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a3a00"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <pattern id="dots3" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.4" fill="rgba(255,255,255,0.12)"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>
  <rect width="800" height="500" fill="url(#dots3)"/>
  <!-- Decorative -->
  <g transform="translate(0,440)">
    <rect x="0" width="800" height="60" fill="#1a5c3a" opacity="0.4"/>
    <rect x="0" width="60" height="60" fill="#f59e0b" opacity="0.7"/>
    <rect x="120" width="60" height="60" fill="#c25b2c" opacity="0.6"/>
    <rect x="240" width="60" height="60" fill="#f59e0b" opacity="0.7"/>
    <rect x="360" width="60" height="60" fill="#c25b2c" opacity="0.6"/>
    <rect x="480" width="60" height="60" fill="#f59e0b" opacity="0.7"/>
    <rect x="600" width="60" height="60" fill="#c25b2c" opacity="0.6"/>
    <rect x="720" width="60" height="60" fill="#f59e0b" opacity="0.7"/>
  </g>
  <!-- Shop/storefront icon -->
  <rect x="250" y="120" width="300" height="220" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Awning -->
  <path d="M240 140 L560 140 L540 170 L260 170 Z" fill="#f59e0b" opacity="0.7"/>
  <line x1="290" y1="140" x2="275" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="340" y1="140" x2="325" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="390" y1="140" x2="385" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="440" y1="140" x2="440" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="490" y1="140" x2="500" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="530" y1="140" x2="545" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="355" y="245" width="90" height="95" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <circle cx="380" cy="295" r="4" fill="rgba(255,255,255,0.5)"/>
  <!-- Windows -->
  <rect x="270" y="195" width="70" height="50" rx="5" fill="rgba(255,165,0,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <rect x="460" y="195" width="70" height="50" rx="5" fill="rgba(255,165,0,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Growth chart bars -->
  <rect x="100" y="280" width="30" height="60" rx="4" fill="rgba(245,158,11,0.6)"/>
  <rect x="140" y="250" width="30" height="90" rx="4" fill="rgba(245,158,11,0.7)"/>
  <rect x="180" y="210" width="30" height="130" rx="4" fill="rgba(245,158,11,0.8)"/>
  <polyline points="115,280 155,250 195,210" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Right side chart -->
  <rect x="590" y="285" width="30" height="55" rx="4" fill="rgba(0,201,167,0.6)"/>
  <rect x="630" y="255" width="30" height="85" rx="4" fill="rgba(0,201,167,0.7)"/>
  <rect x="670" y="215" width="30" height="125" rx="4" fill="rgba(0,201,167,0.8)"/>
  <polyline points="605,285 645,255 685,215" fill="none" stroke="#00c9a7" stroke-width="2.5" stroke-dasharray="5,3"/>
  <!-- Title -->
  <text x="400" y="390" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)">SME Digital Growth Program</text>
  <text x="400" y="413" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">Shopmon · E-commerce · Digital Marketing</text>
</svg>
