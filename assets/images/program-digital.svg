<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1060"/>
      <stop offset="100%" style="stop-color:#3d2b8c"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.15)"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#dots)"/>
  <!-- Kente-inspired decorative strip -->
  <rect y="440" width="800" height="60" fill="#f4a824" opacity="0.8"/>
  <rect y="440" width="800" height="60" fill="none" stroke="#c25b2c" stroke-width="0" opacity="1"/>
  <g transform="translate(0,440)">
    <rect x="0" width="60" height="60" fill="#c25b2c" opacity="0.7"/>
    <rect x="120" width="60" height="60" fill="#1a5c3a" opacity="0.7"/>
    <rect x="240" width="60" height="60" fill="#c25b2c" opacity="0.7"/>
    <rect x="360" width="60" height="60" fill="#1a5c3a" opacity="0.7"/>
    <rect x="480" width="60" height="60" fill="#c25b2c" opacity="0.7"/>
    <rect x="600" width="60" height="60" fill="#1a5c3a" opacity="0.7"/>
    <rect x="720" width="60" height="60" fill="#c25b2c" opacity="0.7"/>
  </g>
  <!-- Screen/laptop illustration -->
  <rect x="200" y="80" width="400" height="260" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <rect x="215" y="95" width="370" height="230" rx="8" fill="#0d1117"/>
  <!-- Code lines on screen -->
  <rect x="235" y="120" width="120" height="8" rx="4" fill="#6c63ff" opacity="0.8"/>
  <rect x="235" y="138" width="200" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="235" y="154" width="160" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="235" y="170" width="220" height="6" rx="3" fill="#00c9a7" opacity="0.7"/>
  <rect x="235" y="188" width="180" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="235" y="204" width="140" height="6" rx="3" fill="#f59e0b" opacity="0.7"/>
  <rect x="235" y="220" width="200" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="235" y="236" width="100" height="6" rx="3" fill="#6c63ff" opacity="0.5"/>
  <!-- Person silhouette -->
  <circle cx="580" cy="200" r="30" fill="rgba(255,255,255,0.12)"/>
  <ellipse cx="580" cy="240" rx="24" ry="18" fill="rgba(255,255,255,0.08)"/>
  <!-- Connection dots -->
  <circle cx="100" cy="150" r="8" fill="#00c9a7" opacity="0.6"/>
  <circle cx="100" cy="190" r="5" fill="#6c63ff" opacity="0.5"/>
  <circle cx="700" cy="150" r="8" fill="#f59e0b" opacity="0.6"/>
  <circle cx="700" cy="190" r="5" fill="#00c9a7" opacity="0.5"/>
  <!-- Laptop base -->
  <rect x="160" y="340" width="480" height="18" rx="6" fill="rgba(255,255,255,0.1)"/>
  <ellipse cx="400" cy="349" rx="40" ry="5" fill="rgba(255,255,255,0.08)"/>
  <!-- Title text -->
  <text x="400" y="405" text-anchor="middle" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.9)">Digital Empowerment Program</text>
  <text x="400" y="428" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">Coding · AI Basics · Digital Skills</text>
</svg>
